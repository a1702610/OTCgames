<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTC Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: linear-gradient(160deg, #F8EFE0 0%, #EDE8FF 60%, #E8EFFF 100%) fixed; min-height: 100vh; color: #140F50; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(131,107,255,0.35); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(131,107,255,0.60); }
      input, textarea, select { font-family: inherit; }
      input::placeholder, textarea::placeholder { color: rgba(20,15,80,0.30); }
      input[type="text"], input[type="email"], textarea, select {
        background: rgba(20,15,80,0.05);
        border: 1.5px solid rgba(20,15,80,0.14);
        color: #140F50;
        border-radius: 10px;
      }
      input[type="text"]:focus, textarea:focus, select:focus {
        outline: none;
        border-color: rgba(131,107,255,0.55);
        box-shadow: 0 0 0 2px rgba(131,107,255,0.15);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/builder/main.jsx"></script>
  </body>
</html>
